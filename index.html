<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web 2 - Security Logic</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .king-text {
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .error {
            color: #ff4d4d;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div id="status" class="king-text">VERIFYING...</div>

    <script>
        // GitHub Raw File ka URL jahan aapne link chhupa kar rakha hai
        const backendConfigURL = "YOUR_GITHUB_RAW_FILE_URL_HERE";

        // URL parameters se API key nikalne ka function
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // API Validation Rules
        function validateAPI(api) {
            if (!api) return false;

            // 1. Total length exactly 10 characters (mt + 8 letters)
            if (api.length !== 10) return false;

            // 2. Must start with 'mt'
            if (!api.startsWith('mt')) return false;

            // 3. Allowed chunks checklist
            const pattern = /^(mt|tm|zf|mh|az|5|12|14|72|786)+$/;
            return pattern.test(api);
        }

        const userAPI = getQueryParam('api');
        const statusDiv = document.getElementById('status');

        // Async function taake GitHub se data fetch kiya ja sakay
        async function handleVerification() {
            if (validateAPI(userAPI)) {
                try {
                    // Jab API valid hogi, tabhi yeh request GitHub par jayegi
                    const response = await fetch(backendConfigURL);
                    if (!response.ok) throw new Error("Network error");
                    
                    const data = await response.json();
                    const secureLink = data.targetURL; // Link yahan recover hoga

                    // Screen par text show karna
                    statusDiv.textContent = "MUHAMMAD TAQI KING";
                    statusDiv.className = "king-text";

                    // Parent window ko secure target link bhejna
                    if (window.parent !== window) {
                        window.parent.postMessage({ status: 'success', url: secureLink }, '*');
                    }

                } catch (error) {
                    statusDiv.textContent = "SERVER ERROR. PLEASE TRY AGAIN.";
                    statusDiv.className = "error";
                }
            } else {
                // Agar API key sahi na ho
                statusDiv.textContent = "INVALID API KEY ACCESS DENIED";
                statusDiv.className = "error";
            }
        }

        // Execution shuru karein
        handleVerification();
    </script>
</body>
</html>
